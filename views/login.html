<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Facturación Electrónica</title>
  <link rel="stylesheet" href="../lib/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="login-page">

  <div class="login-split">
    <aside class="login-hero" aria-hidden="false">
      <div class="login-hero-center">
        <img
          src="../assets/img/logo-ceere-software.png"
          alt="Ceere Software"
          class="login-hero-logo"
        >
        <p class="login-hero-tagline">Facturación Electrónica</p>
      </div>

      <div class="login-hero-bottom">
        <div class="login-hero-trust">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          </svg>
          Seguro y confiable
        </div>
        <p class="login-hero-copy">Copyright © 2026 Ceere Software. Todos los derechos reservados.</p>
      </div>
    </aside>

    <main class="login-panel">
      <div class="login-card">
        <div class="login-card-brand">
          <img
            src="../assets/img/logo-ceere-software.png"
            alt="Ceere Software"
            class="login-logo-ceere"
          >
          <p class="login-welcome">Bienvenido de nuevo</p>
          <h1 class="login-title">Iniciar Sesión</h1>
        </div>

        <div id="loginAlert" class="alert alert-warning alert-login d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="login-field">
            <label for="usuario" class="login-label">Usuario</label>
            <div class="login-input-wrap">
              <span class="login-input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
                </svg>
              </span>
              <input
                type="text"
                class="form-control login-input"
                id="usuario"
                name="usuario"
                placeholder="Usuario"
                autocomplete="username"
              >
            </div>
          </div>

          <div class="login-field">
            <label for="password" class="login-label">Contraseña</label>
            <div class="login-input-wrap">
              <span class="login-input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                </svg>
              </span>
              <input
                type="password"
                class="form-control login-input"
                id="password"
                name="password"
                placeholder="Contraseña"
                autocomplete="current-password"
              >
              <button
                type="button"
                class="login-toggle-password"
                id="btnTogglePassword"
                aria-label="Mostrar contraseña"
                aria-pressed="false"
              >
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                  <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                </svg>
                <svg class="icon-eye-slash d-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                  <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z"/>
                  <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12-.708.708z"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary login-submit w-100">Iniciar sesión</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../lib/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/env-config.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
